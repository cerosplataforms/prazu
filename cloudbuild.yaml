# =============================================================================
# cloudbuild.yaml — Prazu Fase 2
# CI/CD: push no git → build → push no Artifact Registry → deploy no Cloud Run
#
# Setup inicial (rodar uma vez no Cloud Shell):
#   gcloud builds triggers create github \
#     --repo-name=prazu \
#     --repo-owner=cerosplataforms \
#     --branch-pattern="^master$" \
#     --build-config=cloudbuild.yaml \
#     --name=prazu-deploy
# =============================================================================

substitutions:
  _REGION: southamerica-east1
  _SERVICE: prazu
  _REPO: prazu-repo
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}

steps:
  # 1. Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE}:${SHORT_SHA}'
      - '-t'
      - '${_IMAGE}:latest'
      - '.'
    id: 'build'

  # 2. Push no Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_IMAGE}'
    id: 'push'
    waitFor: ['build']

  # 3. Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_IMAGE}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60'
      - '--concurrency=80'
      - '--set-secrets=DB_PASSWORD=db-password:latest,DB_USER=db-user:latest,DB_HOST=db-host:latest,DB_NAME=db-name:latest,JWT_SECRET=jwt-secret:latest,GEMINI_API_KEY=gemini-api-key:latest,ZAPI_TOKEN=zapi-token:latest,ZAPI_INSTANCE=zapi-instance:latest'
      - '--add-cloudsql-instances=${PROJECT_ID}:${_REGION}:prazu-db'
      - '--set-env-vars=GCP_PROJECT=${PROJECT_ID},ENVIRONMENT=production'
    id: 'deploy'
    waitFor: ['push']

images:
  - '${_IMAGE}:${SHORT_SHA}'
  - '${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
