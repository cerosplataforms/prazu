name: Gerar Documentacao Automatica

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  documentar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instala dependencias
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Gera documentacao
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/gerar_docs.py

      - name: Commit documentacao
        run: |
          git config user.name "prazu-docs-bot"
          git config user.email "docs@prazu.com.br"
          git add docs/
          git diff --staged --quiet || git commit -m "docs: atualizacao automatica $(date +%Y-%m-%d)"
          git push
