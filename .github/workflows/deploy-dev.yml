name: Deploy DEV

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    name: Build e Deploy → prazu-dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: prazu-prod

      - name: Build da imagem Docker
        run: |
          gcloud builds submit \
            --tag gcr.io/prazu-prod/prazu-dev:${{ github.sha }} \
            --tag gcr.io/prazu-prod/prazu-dev:latest \
            --project=prazu-prod

      - name: Deploy no Cloud Run DEV
        run: |
          gcloud run deploy prazu-dev \
            --image gcr.io/prazu-prod/prazu-dev:${{ github.sha }} \
            --region southamerica-east1 \
            --project prazu-prod \
            --set-env-vars ENVIRONMENT=development \
            --allow-unauthenticated

      - name: URL do serviço DEV
        run: |
          URL=$(gcloud run services describe prazu-dev \
            --region southamerica-east1 \
            --project prazu-prod \
            --format 'value(status.url)')
          echo "✅ DEV deployado em: $URL"
          echo "### ✅ Deploy DEV concluído" >> $GITHUB_STEP_SUMMARY
          echo "URL: $URL" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Por: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
